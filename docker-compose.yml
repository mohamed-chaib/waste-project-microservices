networks:
  backend:

services:

  # =====================
  # CONSUL
  # =====================
  consul:
    image: hashicorp/consul:latest
    container_name: consul
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"
    networks:
      - backend

  # =====================
  # RABBITMQ
  # =====================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - backend

  # =====================
  # AUTH DB
  # =====================
  auth-db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  # =====================
  # AI DB
  # =====================
  ai-db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ai_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  # =====================
  # RECOMMENDATION DB
  # =====================
  recommendation-db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: recommendation_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3309:3306"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  # =====================
  # TRAEFIK
  # =====================
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--providers.consulcatalog=true"
      - "--providers.consulcatalog.endpoint.address=consul:8500"
      - "--entrypoints.web.address=:80"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "8080:8080"
    depends_on:
      - consul
    networks:
      - backend

  # =====================
  # AUTH SERVICE
  # =====================
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      DB_HOST: auth-db
      DB_NAME: auth_db
      DB_USER: root
      DB_PASSWORD: root
      CONSUL_HOST: consul
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8002:8002"
    depends_on:
      auth-db:
        condition: service_healthy
      consul:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - backend

  # =====================
  # RECOMMENDATION SERVICE
  # =====================
  recommendation-service:
    build: ./recommandation-service
    container_name: recommendation-service
    environment:
      DB_HOST: recommendation-db
      DB_NAME: recommendation_db
      DB_USER: root
      DB_PASSWORD: root
      CONSUL_HOST: consul
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8003:8003"
    depends_on:
      recommendation-db:
        condition: service_healthy
      consul:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - backend

  # =====================
  # GATEWAY
  # =====================
  gateway:
    build: ./gateway
    container_name: gateway
    environment:
      CONSUL_HOST: consul
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8004:8004"
    depends_on:
      - consul
    networks:
      - backend